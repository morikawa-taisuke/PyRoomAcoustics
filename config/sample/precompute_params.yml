# あまり編集しないパラメータ
# シミュレーション基本設定
# ====================================================
simulation_constants:
    # pa.inverse_sabine や search_reverb_sec
    # の計算の基準となるサンプリング周波数
    # (mymodule/rec_config.py の値と合わせる)
    fs: 16000

# ====================================================

# 編集するパラメータ
# 1. 保存先ディレクトリ
# ----------------------------------------------------
# 計算結果のJSON (例: 4.0m_3.0m_2.8m.json) を保存する場所
output_dir: "./precomputed_params"

# 2. 事前計算するパラメータの範囲
# ----------------------------------------------------
# [min, max, step] のリスト形式で指定します
parameter_ranges:

    # 部屋の寸法 (m)
    # ユーザー指定: 「1mごと」
    room_dimensions:
        # 例: X軸 (3m から 10m まで 1m ごと)
        x_m: [ 3.0, 10.0, 1.0 ]

        # 例: Y軸 (3m から 8m まで 1m ごと)
        y_m: [ 3.0, 8.0, 1.0 ]

        # 例: Z軸 (2.5m から 3.5m まで 0.5m ごと)
        # (天井高はステップ幅を小さくするのが一般的です)
        z_m: [ 2.0, 4.0, 1.0 ]

    # 残響時間 (sec)
    # ユーザー指定: 「10msecごと」
    rt60_sec:
        # 例: RT60 (0.1秒 から 1.5秒 まで 0.01秒=10ms ごと)
        value: [ 0.1, 1.5, 0.01 ]