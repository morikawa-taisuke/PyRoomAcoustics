# 1. 📂 パスと基本設定
base_paths:
  # ステップ1で作成した事前計算JSONが保存されているディレクトリ
  precomputed_params_dir: "./precomputed_params"

  # 入力データ
  speech_data_root: "C:/Users/kataoka-lab/Desktop/sound_data/sample_data/speech/DEMAND"
  noise_data_root: "C:/Users/kataoka-lab/Desktop/sound_data/sample_data/noise/DEMAND_16kHz" # hoth.wav ではなく、ノイズのディレクトリを指定

  # 出力データ
  output_data_root: "C:/Users/kataoka-lab/Desktop/sound_data/mix_data"

# 処理するスプリット
splits: ["train", "test", "val"]

# ----------------------------------------------------

# 2. 🌍 シミュレーションと生成の設定
domain_generation_settings:
  output_name: "dataset_1ch_random_rt60_snr_v1" # この実験用の出力名

  # 部屋のパラメータJSONをランダムに選択
  room_selection:
    strategy: 'random'

  # --- ▼ ユーザー指定 (RT60) ▼ ---
  rt60_range: [0.3, 0.8] # 0.3s から 0.8s の間でランダムに選択

  # 部屋（ドメイン）の数 (学習用50, 検証用5, テスト用10)
  num_rooms_per_split:
    train: 50
    val: 5
    test: 10

  # データ拡張なし (教師データ数 / 部屋数 で自動計算)
  num_files_per_room: 'auto'

# ----------------------------------------------------

# 3. 🎤 マイクの配置
microphone:
  # --- ▼ ユーザー指定 (マイク座標) ▼ ---
  # 'center' を指定すると、スクリプトが部屋の中心座標を自動計算します
  position_strategy: 'center'

  array:
    # --- ▼ ユーザー指定 (1ch) ▼ ---
    shape: 'single'
    channels: 1

# ----------------------------------------------------

# 4. 🔉 音源の配置 (シミュレーションごと)
speech_source:
  position_strategy: 'fixed_spherical' # <-- 固定戦略に変更
  params:
    azimuth: 90      # 水平角 0度 (マイク正面)
    elevation: 0    # 仰角 0度 (マイク水平)
    distance: 1.5   # 距離 1.5m
noise_source:
  count_range: [1, 1] # ノイズ源は1つ
  position_strategy: 'fixed_spherical' # <-- 固定戦略に変更
  params:
    azimuth: 0      # 水平角 0度 (マイク正面)
    elevation: 0    # 仰角 0度 (マイク水平)
    distance: 1.5   # 距離 1.5m
# ----------------------------------------------------

# 5. 🎛️ 混合パラメータ (ファイルごと)
mixing_params:
  # --- (ご要望: どちらにも設定したい) ---
  snr_range_db: [-5, 10] # ランダム (5dB ~ 20dB)
                        # 固定する場合: [10, 10] (旧)

# ----------------------------------------------------

# 6. 💾 保存設定 (B案拡張)
output_files:
  # どの音声ファイルをWAVとして保存するかこれにより、B案でもA案 のように複数のデータセットを同時に（しかしRIRファイル無しで）生成できる
  save_noise_reverb: true     # 雑音と残響の両方を付加した音声
  save_reverb_only: true      # 残響のみを付加した音声
  save_noise_only: true       # 雑音のみを付加した音声
  save_clean: true            # 教師データ
